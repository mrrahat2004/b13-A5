<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

   <link rel="stylesheet" href="index.css">


</head>
<body class="bg-[#f8f5f5]">

<nav class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">
        GitHub Issues Tracker
    </h1>

    <div class="flex gap-2">

        <input type="text" id="searchInput" class="border px-4 py-2 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="Search issue">

        <button onclick="searchIssue()" class="bg-purple-600 text-white px-4 py-2 rounded-lg">
            Search
        </button>

    </div>

</nav>

<div class="max-w-7xl mx-auto mt-6 px-6">

    <div class="flex gap-4 mb-4">

        <button onclick="loadIssues('all')" id="allTab" class="tabBtn bg-purple-600 text-white px-5 py-2 rounded-lg hover:bg-purple-500">
        All
        </button>

        <button onclick="loadIssues('open')" id="openTab" class="tabBtn bg-gray-200 px-5 py2
        rounded-lg">
        Open
        </button>

        <button onclick="loadIssues('closed')" id="closedTab" class="tabBtn bg-gray-200 px-5 py2
        rounded-lg">
        Closed
        </button>

    </div>


    <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm mb-6">

        <div class="flex gap-3 items-center">
            <div class="text-xl">
                <img src="assets/Aperture.png" alt="">
            </div>
            <p id="issueCount" class="font-semibold ">
                0 Issues
            </p>
        </div>

        <div class="flex gap-2 text-sm">
            <img src="assets/Open-Status.png" alt="">
            <span class="text-green-600 font-medium">
                Open</span>
            <img src="assets/Closed- Status .png" alt="">
            <span class="text-purple-600 font-medium"> Closed</span>
        </div>

    </div>

    <div id="loader" class="text-center hidden py-10">
        Loading Issues...
    </div>

    <div id="issuesContainer" class="grid lg:grid-cols-4 md:grid-cols-2 gap-6">

    </div>
    

</div>

<div id="modal" class="fixed inset-0 hidden items-center justify-center">
    <div class="bg-blue-200 p-6 rounded-xl w-[400px]">

        <h2 id="modalTitle" class="text-xl font-bold mb-2">

        </h2>
        <p id="modalDesc" class="text-gray-600 mb-3">

        </p>

        <div class="text-sm space-y-1">
            <p id="modalAuthor"></p>
            <p id="modalCategory"></p>
            <p id="modalPriority"></p>
            <p id="modalLabel"></p>
            <p id="modalDate"></p>
        </div>

        <button onclick="closeModal()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded">
            Close
        </button>

    </div>

</div>

<script>
    const API = "https://phi-lab-server.vercel.app/api/v1/lab/issues"

    const container=document.getElementById("issuesContainer")
    const loader=document.getElementById("loader")
    const issueCount=document.getElementById("issueCount")

    async function loadIssues(type="all") {
        
        loader.classList.remove("hidden")
        container.innerHTML=""

        const res=await fetch(API)
        const data=await res.json()

        let issues=data.data

        if(type==="open"){
            issues=issues.filter(i=>i.status==="open");
        }

        if(type==="closed"){
            issues=issues.filter(i=>i.status==="closed");
        }

        issueCount.innerText = issues.length + " Issues";

        renderIssues(issues)

        loader.classList.add("hidden")

    }

    function renderIssues(issues){

        container.innerHTML=""

        issues.forEach(issue=>{

            let color=issue.status==="open"
            ? "border-green-500"
            : "border-purple-500"

            const card=document.createElement("div")

            card.className=`bg-white p-4 rounded-lg shadow border-t-4 ${color} cursor-pointer`

        card.innerHTML=`
            
            <div class="flex justify-between items-start">
              <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center">
              <img src="assets/Open-Status.png" class="w-6 h-6" onerror="this.src='https://img.icons8.com/color/48/000000/opened-folder.png'">       
              </div>
            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${issue.priority === 'High' ? 'bg-orange-100 text-orange-600' : 'bg-yellow-100 text-yellow-600'}">
            ${issue.priority}
             </span>
        </div>
         <div>
            <h3 class="text-lg font-bold text-gray-800 leading-tight mb-2">${issue.title}</h3>
            <p class="text-gray-500 text-xs line-clamp-2">${issue.description}</p>
         </div>
        <div class="flex gap-2 py-2.5">
            <span class="flex items-center gap-1 px-3 py-1 rounded-full border border-red-100 text-red-500 text-[10px] font-bold"> BUG</span>
            <span class="flex items-center gap-1 px-3 py-1 rounded-full border border-yellow-100 text-yellow-600 text-[10px] font-bold"> HELP WANTED</span>
        </div>
            

                <div class="text-[12px] space-y-1">
                    <p><b>Status:</b> ${issue.status}</p>
                    <p><b>Category:</b> ${issue.category}</p>
                    <p><b>Author:</b> ${issue.author}</p>
                    <p><b>Priority:</b> ${issue.priority}</p>
                    <p><b>Label:</b> ${issue.label}</p>
                    <p><b>Date:</b> ${issue.createdAt}</p>

                </div>
            `

            card.onclick=()=>openModal(issue)

            container.appendChild(card)

        })

    }


    function openModal(issue){

        document.getElementById("modal").classList.remove("hidden")
        document.getElementById("modalTitle").innerText=issue.title
        document.getElementById("modalDesc").innerText=issue.description
        document.getElementById("modalAuthor").innerText="Author: " +issue.author
        document.getElementById("modalCategory").innerText="Category: "+issue.category
        document.getElementById("modalPriority").innerText="priority: "+issue.priority
        document.getElementById("modalLabel").innerText="Label: "+issue.label
        document.getElementById("modalDate").innerText="Created: "+issue.createdAt

    }

    function closeModal(){
        document.getElementById("modal").classList.add("hidden")
    }

    async function searchIssue() {

        const text=document.getElementById("searchInput").value 

        loader.classList.remove("hidden")

        const res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${text}`);
        const data = await res.json();

        renderIssues(data.data)

        loader.classList.add("hidden")
        
    }
    loadIssues()



</script>
 


</body>
</html>
