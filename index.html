<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>


    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

   <link rel="stylesheet" href="index.css">




</head>
<body>
    

    <section id="login-page" class="flex items-center justify-center min-h-screen">
        
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center gap-3">
            <img src="assets/github-logo.png" alt="" class="w-16 mx-auto mb-4">
            <h2 class="text-2xl font-bold" > GitHub Issues Tracker</h2>
            <p class="text-gray-500 mb-6 text-sm"> Sign in to manage your issues</p>

            <input type="text" id="username" placeholder="username" class="w-full p-2 mb-3 borer rounded focus:ring-2 focus:ring-blue-400 outline-none">
            <input type="password" id="password" placeholder="password" class="w-full p-2 mb-3 borer rounded focus:ring-2 focus:ring-blue-400 outline-none">

            <button id="login-btn" class="w-full bg-indigo-600 text-white p-3 rounded font-semibold hover:bg-indigo-700 transition ">
            Sign In
            </button>

            <div class="mt-6p3
            bg-blue-50 border border-blue-100 rounded text-[12px] text-center p-5">
                <p class="font-bold">Demo Credentials:</p>
                <p>Username: admin</p>
                <p>Password: admin123</p>
            </div>

        </div>


    </section>



    <script>

        document.getElementById('login-btn').addEventListener('click', () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if ( user === 'admin' && pass === 'admin123'){
            
                window.location.href = "home.html";
            } 
            else {
                alert("invalid Password or Username ! Try Again user= admin / pass = admin123");
            }

        });

    </script>


</body>
</html>
